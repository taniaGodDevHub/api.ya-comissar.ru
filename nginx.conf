server {
    listen 80;
    listen 443 ssl http2;
    server_name api.112avarkom.ru;
    
    # SSL настройки (если используется)
    # ssl_certificate /path/to/certificate.crt;
    # ssl_certificate_key /path/to/private.key;
    
    # Корневая папка приложения
    root /path/to/your/project/web;
    index index.php;
    
    # Логи
    access_log /var/log/nginx/api.112avarkom.ru.access.log;
    error_log /var/log/nginx/api.112avarkom.ru.error.log;
    
    # Настройки для статических файлов
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    
    # Настройки для API с CORS
    location /api/ {
        # CORS заголовки
        add_header 'Access-Control-Allow-Origin' $http_origin always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, HEAD, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Max-Age' '86400' always;
        
        # Проверяем разрешенные домены
        if ($http_origin ~* ^https://(112avarkom\.ru|www\.112avarkom\.ru)$) {
            add_header 'Access-Control-Allow-Origin' $http_origin always;
        }
        
        if ($http_origin ~* ^http://(localhost:5173|localhost:3000|127\.0\.0\.1:5173)$) {
            add_header 'Access-Control-Allow-Origin' $http_origin always;
        }
        
        # Обработка OPTIONS запросов
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $http_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, HEAD, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' '86400' always;
            add_header 'Content-Length' 0;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            return 204;
        }
        
        # Перенаправляем на index.php
        try_files $uri $uri/ /index.php?$query_string;
    }
    
    # Основная конфигурация для Yii
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
    
    # Обработка PHP файлов
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock; # или 127.0.0.1:9000
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        
        # Дополнительные параметры для Yii
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
    }
    
    # Запрещаем доступ к конфиденциальным файлам
    location ~ /\. {
        deny all;
    }
    
    location ~ /(config|migrations|models|controllers|views|widgets|vendor|runtime|tests)/ {
        deny all;
    }
    
    location ~ \.(json|lock|md)$ {
        deny all;
    }
}
